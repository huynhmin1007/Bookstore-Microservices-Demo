spring:
  application:
    name: profile-service
  config:
    import: "configserver:http://localhost:9999"

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 123456789

app:
  security:
    public-endpoints: [ ]

  rabbitmq:
    exchanges:
      dlx: profile.domain.dlx
    queues:
      low-priority: profile.low-priority.queue
      high-priority: profile.high-priority.queue