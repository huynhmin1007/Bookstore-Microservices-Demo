spring:
  application:
    name: payment-service
  config:
    import: "configserver:http://localhost:9999"

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        default_batch_fetch_size: 100
        order_updates: true
        order_inserts: true

app:
  security:
    public-endpoints: [ ]