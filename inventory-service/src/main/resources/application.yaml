server:
  port: 9002

grpc:
  server:
    port: 9101

spring:
  application:
    name: inventory-service
  config:
    import: "optional:configserver:http://config-server:9999"

  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/inventory_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        default_batch_fetch_size: 100
        order_updates: true
        order_inserts: true

app:
  security:
    public-endpoints: [ ]