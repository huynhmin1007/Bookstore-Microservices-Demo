syntax = "proto3";

package minn.profile;

option java_multiple_files = true;
option java_package = "com.dev.minn.grpc.profile";

service ProfileGrpcService {
  rpc CreateProfile (CreateProfileRequest) returns (CreateProfileResponse);
  rpc GetProfile (GetProfileRequest) returns (ProfileResponse);
}

message CreateProfileRequest {
  string account_id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
}

message CreateProfileResponse {
  string profile_id = 1;
  string status = 2;
}

message GetProfileRequest {
  string account_id = 1;
}

message ProfileResponse {
  string account_id = 1;
  string profile_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
}